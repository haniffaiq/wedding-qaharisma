# Add inside the existing `server { ... }` block that serves the site
# (the one with server_name risma-qahhar.kukuh.online and TLS).
# nginx terminates HTTPS and forwards the Telegram webhook to the local bot.

location = /api/telegram {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Preserve Telegram's secret-token header for the bot to verify:
    proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
}
